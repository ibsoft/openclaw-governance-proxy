version: '1.0'
description: Extended professional AI chat protection rules for OpenClaw Governance Proxy
rules:
- id: cloud_metadata_protection
  name: Cloud metadata protection
  description: Blocks direct access to common cloud metadata endpoints.
  enabled: true
  severity: critical
  action: block
  direction: request
  match_type: domain
  scope: global
  agent_id: null
  policy_mode: null
  patterns: []
  domains:
  - 169.254.169.254
  - metadata.google.internal
  - 100.100.100.200
  - 169.254.170.2
  - 169.254.169.123
  content_types: []
  tags:
  - ssrf
  - metadata
  notes: ''
- id: credential_exfiltration
  name: Credential exfiltration
  description: Blocks attempts to steal or send local secrets.
  enabled: true
  severity: critical
  action: block
  direction: both
  match_type: regex
  scope: global
  agent_id: null
  policy_mode: null
  patterns:
  - (?i)exfiltrate
  - (?i)steal\s+(secrets|credentials|tokens|api\s+keys)
  - (?i)send\s+(the\s+)?contents\s+of\s+(/[^\s]+)
  - (?i)read\s+(/etc/passwd|/etc/shadow|\.env|id_rsa|id_ed25519)
  domains: []
  content_types: []
  tags:
  - secrets
  notes: ''
- id: dangerous_autonomy
  name: Dangerous autonomous actions
  description: Warns on high-risk autonomous and scanning instructions.
  enabled: true
  severity: medium
  action: warn
  direction: both
  match_type: regex
  scope: global
  agent_id: null
  policy_mode: null
  patterns:
  - (?i)unauthorized\s+scanning
  - (?i)deploy\s+malware
  - (?i)disable\s+(logging|audit|security)
  - (?i)run\s+without\s+approval
  domains: []
  content_types: []
  tags:
  - autonomy
  notes: ''
- id: policy_bypass_jailbreak
  name: Policy bypass and jailbreak
  description: Detects jailbreak and guardrail bypass language.
  enabled: true
  severity: critical
  action: block
  direction: both
  match_type: regex
  scope: global
  agent_id: null
  policy_mode: null
  patterns:
  - (?i)bypass\s+(policy|rules|safety|guardrails)
  - (?i)jailbreak
  - (?i)role\s*override
  - (?i)tool-use\s+manipulation
  - (?i)ignore\s+(safety\s+)?guardrails
  - (?i)ignore\s+safety\s+(rules|policy)
  domains: []
  content_types: []
  tags:
  - jailbreak
  notes: ''
- id: private_key_leakage
  name: Private key leakage
  description: Blocks private key material.
  enabled: true
  severity: critical
  action: block
  direction: both
  match_type: regex
  scope: global
  agent_id: null
  policy_mode: null
  patterns:
  - '-----BEGIN\s+(RSA|OPENSSH|PRIVATE)\s+KEY-----'
  - (?i)\bapi[_-]?key\b\s*[:=]\s*['\"]?[A-Za-z0-9._\-]{16,}
  - (?i)bearer\s+[a-zA-Z0-9._\-]{20,}
  - (?i)\bpassword\b\s*[:=]\s*['\"]?[^'\"\s,;]{8,}
  - (?i)\bsecret\b\s*[:=]\s*['\"]?[^'\"\s,;]{8,}
  - (?i)\btoken\b\s*[:=]\s*['\"]?[A-Za-z0-9._\-]{16,}
  - (?i)aws_access_key_id\s*[:=]\s*['\"]?[A-Z0-9]{16,}
  - (?i)aws_secret_access_key\s*[:=]\s*['\"]?[A-Za-z0-9/+=]{32,}
  - (?i)github_pat_[A-Za-z0-9_]+
  - (?i)ghp_[A-Za-z0-9]{20,}
  - (?i)xox[baprs]-[A-Za-z0-9-]+
  - (?i)sk-[A-Za-z0-9]{20,}
  - (?i)postgresql://[^\s]+
  - (?i)mysql://[^\s]+
  - (?i)mongodb(\+srv)?://[^\s]+
  domains: []
  content_types: []
  tags:
  - secrets
  notes: ''
- id: prompt_injection_ignore_previous
  name: Prompt injection ignore previous instructions
  description: Detects common instruction override attempts.
  enabled: true
  severity: critical
  action: block
  direction: both
  match_type: regex
  scope: global
  agent_id: null
  policy_mode: null
  patterns:
  - (?i)ignore\s+(all\s+)?previous\s+instructions
  - (?i)disregard\s+(all\s+)?previous\s+instructions
  - (?i)forget\s+(all\s+)?previous\s+instructions
  - (?i)you\s+are\s+now\s+in\s+developer\s+mode
  - (?i)act\s+as\s+(dan|developer\s+mode|unrestricted)
  - (?i)ignore(?:\s|%20|%2520|\+)+(all(?:\s|%20|%2520|\+)+)?previous(?:\s|%20|%2520|\+)+instructions
  - (?i)disregard(?:\s|%20|%2520|\+)+(all(?:\s|%20|%2520|\+)+)?previous(?:\s|%20|%2520|\+)+instructions
  - (?i)forget(?:\s|%20|%2520|\+)+(all(?:\s|%20|%2520|\+)+)?previous(?:\s|%20|%2520|\+)+instructions
  domains: []
  content_types: []
  tags:
  - prompt-injection
  notes: ''
- id: secret_detector
  name: Secret detector
  description: Monitors credential-like content. Specific high-confidence secret rules handle blocking.
  enabled: true
  severity: critical
  action: monitor
  direction: both
  match_type: secret_detector
  scope: global
  agent_id: null
  policy_mode: null
  patterns: []
  domains: []
  content_types: []
  tags:
  - secrets
  notes: ''
- id: suspicious_exfil_destinations
  name: Suspicious exfiltration destinations
  description: Blocks paste, webhook, and tunnel destinations.
  enabled: true
  severity: high
  action: block
  direction: request
  match_type: domain
  scope: global
  agent_id: null
  policy_mode: null
  patterns: []
  domains:
  - pastebin.com
  - hastebin.com
  - webhook.site
  - requestbin.com
  - requestbin.net
  - ngrok-free.app
  - localtunnel.me
  - interact.sh
  - oastify.com
  content_types: []
  tags:
  - exfiltration
  notes: ''
- id: system_prompt_extraction
  name: System prompt extraction
  description: Blocks attempts to reveal hidden instructions.
  enabled: true
  severity: critical
  action: block
  direction: both
  match_type: regex
  scope: global
  agent_id: null
  policy_mode: null
  patterns:
  - (?i)reveal\s+(the\s+)?system\s+prompt
  - (?i)show\s+(me\s+)?(your\s+)?hidden\s+instructions
  - (?i)print\s+(your\s+)?system\s+message
  - (?i)developer\s+message
  - (?i)chain\s+of\s+thought
  - (?i)private\s+reasoning
  domains: []
  content_types: []
  tags:
  - prompt-injection
  notes: ''
- id: instruction_hierarchy_override
  name: Instruction hierarchy override
  description: Blocks attempts to reorder or override system, developer, or governance priorities.
  enabled: true
  severity: critical
  action: block
  direction: both
  match_type: regex
  scope: global
  agent_id: null
  policy_mode: null
  patterns:
  - (?i)\b(system|developer|admin|policy)\s+(instructions?|messages?)\s+(are|is)\s+(now\s+)?(irrelevant|invalid|disabled|obsolete)
  - (?i)\b(new|higher|top)\s+(priority|authority|hierarchy)\b.*\b(ignore|override|replace)\b
  - (?i)\bfrom\s+now\s+on\b.*\b(ignore|override|disregard)\b.*\b(system|developer|policy|governance)\b
  - (?i)\bthis\s+message\s+(supersedes|overrides|replaces)\s+(all\s+)?(previous|system|developer)\s+instructions
  - (?i)\bpriority\s*[:=]\s*(highest|system|developer|root)\b.*\bignore\b
  domains: []
  content_types: []
  tags:
  - prompt-injection
  - hierarchy
  notes: ''
- id: fake_system_message_injection
  name: Fake system message injection
  description: Detects content pretending to be a system, developer, root, or administrative message.
  enabled: true
  severity: high
  action: block
  direction: both
  match_type: regex
  scope: global
  agent_id: null
  policy_mode: null
  patterns:
  - '(?i)^\s*(system|developer|admin|root)\s*(message|instruction|prompt)\s*:'
  - (?i)<\s*(system|developer|admin|root)[^>]*>
  - (?i)\[(system|developer|admin|root)\s*(message|instruction|prompt)\]
  - (?i)BEGIN\s+(SYSTEM|DEVELOPER|ADMIN)\s+(PROMPT|MESSAGE|INSTRUCTIONS)
  - (?i)END\s+(SYSTEM|DEVELOPER|ADMIN)\s+(PROMPT|MESSAGE|INSTRUCTIONS)
  domains: []
  content_types: []
  tags:
  - prompt-injection
  - spoofing
  notes: ''
- id: prompt_leakage_request
  name: Prompt leakage request
  description: Blocks attempts to expose hidden prompts, policies, tool definitions, memory, or configuration.
  enabled: true
  severity: critical
  action: block
  direction: both
  match_type: regex
  scope: global
  agent_id: null
  policy_mode: null
  patterns:
  - (?i)\b(show|print|dump|display|repeat|reveal|write)\b.*\b(system|developer|hidden|internal)\s+(prompt|message|instructions?|policy|rules?)\b
  - (?i)\bwhat\s+(are|were)\s+your\s+(system|developer|hidden|initial)\s+(instructions?|prompt)\b
  - (?i)\bverbatim\b.*\b(system|developer|hidden|internal)\b
  - (?i)\btool\s+(schema|definitions?|instructions?|manifest)\b
  - (?i)\b(memory|scratchpad|chain\s+of\s+thought|private\s+reasoning)\b.*\b(show|print|reveal|dump)\b
  domains: []
  content_types: []
  tags:
  - prompt-leakage
  - data-protection
  notes: ''
- id: chain_of_thought_extraction
  name: Chain-of-thought extraction
  description: Blocks direct requests for hidden reasoning, scratchpad, or internal deliberation.
  enabled: true
  severity: critical
  action: block
  direction: both
  match_type: regex
  scope: global
  agent_id: null
  policy_mode: null
  patterns:
  - (?i)\bchain[-\s]?of[-\s]?thought\b
  - (?i)\bshow\s+(your\s+)?(reasoning|scratchpad|hidden\s+thoughts|internal\s+monologue)\b
  - (?i)\bthink\s+out\s+loud\b.*\b(private|hidden|complete|verbatim)\b
  - (?i)\breveal\s+(your\s+)?(analysis|private\s+analysis|deliberation)\b
  - (?i)\bdo\s+not\s+summarize\b.*\bshow\s+all\s+reasoning\b
  domains: []
  content_types: []
  tags:
  - cot
  - privacy
  notes: ''
- id: roleplay_jailbreak
  name: Roleplay jailbreak
  description: Detects roleplay attempts designed to bypass safety or governance controls.
  enabled: true
  severity: high
  action: block
  direction: both
  match_type: regex
  scope: global
  agent_id: null
  policy_mode: null
  patterns:
  - (?i)\bpretend\s+(you\s+are|to\s+be)\b.*\b(unrestricted|uncensored|jailbroken|no\s+rules)\b
  - (?i)\broleplay\s+as\b.*\b(hacker|malware|criminal|unfiltered|unrestricted)\b
  - (?i)\bDAN\b|\bdo\s+anything\s+now\b
  - (?i)\bdeveloper\s+mode\b.*\b(enabled|on|active)\b
  - (?i)\bno\s+(ethical|legal|safety|policy)\s+limits\b
  domains: []
  content_types: []
  tags:
  - jailbreak
  - roleplay
  notes: ''
- id: obedience_coercion
  name: Coercive obedience instruction
  description: Detects coercive language that tries to force the model or agent to comply without checks.
  enabled: true
  severity: medium
  action: warn
  direction: both
  match_type: regex
  scope: global
  agent_id: null
  policy_mode: null
  patterns:
  - (?i)\byou\s+must\s+comply\b
  - (?i)\bdo\s+not\s+refuse\b
  - (?i)\bnever\s+say\s+(no|cannot|can't|unable)\b
  - (?i)\banswer\s+without\s+(warnings|disclaimers|limitations|policy)\b
  - (?i)\bno\s+matter\s+what\b.*\b(comply|execute|follow)\b
  domains: []
  content_types: []
  tags:
  - coercion
  - prompt-injection
  notes: ''
- id: tool_abuse_instruction
  name: Tool abuse instruction
  description: Blocks attempts to manipulate tools, connectors, browsers, shells, files, or APIs outside authorization.
  enabled: true
  severity: critical
  action: block
  direction: both
  match_type: regex
  scope: global
  agent_id: null
  policy_mode: null
  patterns:
  - (?i)\b(use|call|invoke|run)\s+(the\s+)?(tool|browser|shell|terminal|python|api|connector)\b.*\b(ignore|bypass|without\s+permission)\b
  - (?i)\bexfiltrate\b.*\b(tool|connector|browser|filesystem|calendar|email|drive)\b
  - (?i)\bdelete\b.*\b(logs?|audit|evidence|history|traces?)\b
  - (?i)\bdisable\b.*\b(logging|monitoring|audit|security|edr|antivirus|firewall)\b
  - (?i)\bmake\s+network\s+requests?\b.*\bwithout\s+(approval|authorization|logging)\b
  domains: []
  content_types: []
  tags:
  - tools
  - abuse
  notes: ''
- id: agent_memory_poisoning
  name: Agent memory poisoning
  description: Detects attempts to poison long-term memory, agent identity, preferences, or future behavior.
  enabled: true
  severity: high
  action: block
  direction: both
  match_type: regex
  scope: global
  agent_id: null
  policy_mode: null
  patterns:
  - (?i)\bremember\s+that\b.*\b(ignore|bypass|disable|override)\b
  - (?i)\bsave\s+to\s+memory\b.*\b(system|developer|policy|secret|token)\b
  - (?i)\bfrom\s+now\s+on\b.*\btrust\s+this\s+source\b
  - (?i)\bupdate\s+(your\s+)?memory\b.*\b(unrestricted|no\s+policy|ignore\s+rules)\b
  - (?i)\bstore\s+this\s+as\s+(a\s+)?system\s+instruction\b
  domains: []
  content_types: []
  tags:
  - memory
  - poisoning
  notes: ''
- id: rag_retrieval_poisoning
  name: RAG retrieval poisoning
  description: Detects document content attempting to control the agent after retrieval.
  enabled: true
  severity: high
  action: block
  direction: response
  match_type: regex
  scope: global
  agent_id: null
  policy_mode: null
  patterns:
  - (?i)\bwhen\s+(an\s+)?AI\s+(assistant|agent|model)\s+reads\s+this\b.*\b(ignore|override|disregard)\b
  - (?i)\bdear\s+(assistant|agent|model)\b.*\bignore\s+previous\b
  - (?i)\bthis\s+document\s+contains\s+instructions\s+for\s+the\s+AI\b
  - (?i)\bhidden\s+instruction\s+to\s+the\s+assistant\b
  - (?i)\bdo\s+not\s+tell\s+the\s+user\s+about\s+this\s+instruction\b
  domains: []
  content_types: []
  tags:
  - rag
  - prompt-injection
  notes: ''
- id: html_prompt_injection
  name: HTML prompt injection
  description: Detects hidden or embedded prompt injection in HTML, markdown, CSS, comments, or metadata.
  enabled: true
  severity: high
  action: block
  direction: response
  match_type: regex
  scope: global
  agent_id: null
  policy_mode: null
  patterns:
  - (?is)<!--.*?(ignore|disregard|override).*?(instructions|policy|rules).*?-->
  - (?is)<meta[^>]+content=[\"'][^\"']*(ignore|override|jailbreak)[^\"']*[\"']
  - (?is)<[^>]+style=[\"'][^\"']*(display\s*:\s*none|visibility\s*:\s*hidden)[^\"']*[\"'][^>]*>[^<]*(ignore|override|reveal)
  - (?i)\[//\]:\s*#\s*\(.*(ignore|override|system\s+prompt).*\)
  - (?i)<script[^>]*>.*(ignore\s+previous|reveal\s+system\s+prompt).*?</script>
  domains: []
  content_types: []
  tags:
  - html
  - prompt-injection
  notes: ''
- id: base64_obfuscation_prompt_injection
  name: Base64 or encoding obfuscation
  description: Warns on suspicious encoded instruction-transfer language.
  enabled: true
  severity: medium
  action: warn
  direction: both
  match_type: regex
  scope: global
  agent_id: null
  policy_mode: null
  patterns:
  - (?i)\b(base64|hex|rot13|url\s*decode|unicode\s*escape)\b.*\b(decode|execute|follow|obey)\b
  - (?i)\bdecode\s+this\b.*\bthen\s+(follow|execute|obey)\b
  - (?i)\bhidden\s+message\s+is\s+encoded\b
  - (?i)\bafter\s+decoding\b.*\bignore\s+previous\b
  - (?i)\bdo\s+not\s+show\s+the\s+decoded\s+text\b.*\bexecute\b
  domains: []
  content_types: []
  tags:
  - obfuscation
  - encoding
  notes: ''
- id: secret_value_patterns_general
  name: General secret value patterns
  description: Detects common API keys, tokens, JWTs, and credentials in chat content.
  enabled: true
  severity: critical
  action: block
  direction: both
  match_type: regex
  scope: global
  agent_id: null
  policy_mode: null
  patterns:
  - (?i)\bauthorization\s*:\s*bearer\s+[A-Za-z0-9._\-]{20,}
  - \beyJ[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,}\b
  - (?i)\b(api[_-]?key|access[_-]?token|refresh[_-]?token|client[_-]?secret)\s*[:=]\s*['\"]?[A-Za-z0-9._\-\/+=]{16,}
  - (?i)\b(private[_-]?key|secret[_-]?key)\s*[:=]\s*['\"]?[A-Za-z0-9._\-\/+=]{16,}
  - (?i)\b(password|passwd|pwd)\s*[:=]\s*['\"]?[^'\"\s,;]{8,}
  domains: []
  content_types: []
  tags:
  - secrets
  - tokens
  notes: ''
- id: cloud_provider_keys
  name: Cloud provider key leakage
  description: Blocks AWS, Azure, Google Cloud, and generic cloud credential leakage.
  enabled: true
  severity: critical
  action: block
  direction: both
  match_type: regex
  scope: global
  agent_id: null
  policy_mode: null
  patterns:
  - \bAKIA[0-9A-Z]{16}\b
  - \bASIA[0-9A-Z]{16}\b
  - (?i)\baws_secret_access_key\b\s*[:=]\s*['\"]?[A-Za-z0-9/+=]{40}
  - (?i)\baws_session_token\b\s*[:=]\s*['\"]?[A-Za-z0-9/+=]{50,}
  - (?i)\bazure[_-]?(client|tenant|subscription)[_-]?id\b\s*[:=]\s*['\"]?[0-9a-f-]{32,}
  - (?i)\bazure[_-]?client[_-]?secret\b\s*[:=]\s*['\"]?[^'\"\s]{16,}
  - (?i)-----BEGIN\s+PRIVATE\s+KEY-----[\s\S]{0,2000}client_email[\s\S]{0,2000}-----END\s+PRIVATE\s+KEY-----
  domains: []
  content_types: []
  tags:
  - cloud
  - secrets
  notes: ''
- id: source_code_secret_leakage
  name: Source code secret leakage
  description: Detects secrets in source code style assignments and configuration.
  enabled: true
  severity: critical
  action: block
  direction: both
  match_type: regex
  scope: global
  agent_id: null
  policy_mode: null
  patterns:
  - (?i)\b(const|let|var|string|private\s+string)\s+\w*(secret|token|password|apikey|api_key)\w*\s*=\s*['\"][^'\"]{8,}['\"]
  - (?i)\b(process\.env|os\.environ|getenv)\s*\(\s*['\"]?(SECRET|TOKEN|PASSWORD|API_KEY)
  - (?i)\b.env\b.*\b(API_KEY|SECRET|TOKEN|PASSWORD)\b
  - (?i)\bconnectionstring\b\s*[:=]\s*['\"][^'\"]+['\"]
  - (?i)\bDefaultEndpointsProtocol=https;AccountName=.*;AccountKey=.*;EndpointSuffix=
  domains: []
  content_types: []
  tags:
  - source-code
  - secrets
  notes: ''
- id: database_connection_leakage
  name: Database connection leakage
  description: Blocks database connection strings and credentials.
  enabled: true
  severity: critical
  action: block
  direction: both
  match_type: regex
  scope: global
  agent_id: null
  policy_mode: null
  patterns:
  - (?i)\bpostgres(ql)?://[^:\s]+:[^@\s]+@[^/\s]+/[^\s]+
  - (?i)\bmysql://[^:\s]+:[^@\s]+@[^/\s]+/[^\s]+
  - (?i)\bmongodb(\+srv)?://[^:\s]+:[^@\s]+@[^/\s]+
  - (?i)\bredis://(:[^@\s]+@)?[^/\s]+
  - (?i)\b(server|data source)\s*=\s*[^;]+;\s*(user id|uid)\s*=\s*[^;]+;\s*(password|pwd)\s*=
  domains: []
  content_types: []
  tags:
  - database
  - secrets
  notes: ''
- id: ssh_gpg_key_leakage
  name: SSH and PGP key leakage
  description: Blocks private SSH, PGP, and certificate key material.
  enabled: true
  severity: critical
  action: block
  direction: both
  match_type: regex
  scope: global
  agent_id: null
  policy_mode: null
  patterns:
  - '-----BEGIN\s+OPENSSH\s+PRIVATE\s+KEY-----'
  - '-----BEGIN\s+RSA\s+PRIVATE\s+KEY-----'
  - '-----BEGIN\s+EC\s+PRIVATE\s+KEY-----'
  - '-----BEGIN\s+DSA\s+PRIVATE\s+KEY-----'
  - '-----BEGIN\s+PGP\s+PRIVATE\s+KEY\s+BLOCK-----'
  - '-----BEGIN\s+ENCRYPTED\s+PRIVATE\s+KEY-----'
  domains: []
  content_types: []
  tags:
  - keys
  - secrets
  notes: ''
- id: oauth_session_cookie_leakage
  name: OAuth and session cookie leakage
  description: Detects OAuth codes, session cookies, and authentication artifacts.
  enabled: true
  severity: critical
  action: block
  direction: both
  match_type: regex
  scope: global
  agent_id: null
  policy_mode: null
  patterns:
  - (?i)\b(code|auth_code|authorization_code)\s*[:=]\s*['\"]?[A-Za-z0-9._\-]{16,}
  - (?i)\b(id_token|access_token|refresh_token)\s*[:=]\s*['\"]?[A-Za-z0-9._\-]{16,}
  - (?i)\b(sessionid|session_id|sid|connect\.sid|JSESSIONID|PHPSESSID)\s*[:=]\s*[^;\s]{8,}
  - (?i)\bset-cookie\s*:\s*[^;\n]*(session|token|auth)[^;\n]*
  - (?i)\bcookie\s*:\s*.*(session|auth|token)=
  domains: []
  content_types: []
  tags:
  - oauth
  - cookies
  - secrets
  notes: ''
- id: pii_sensitive_data_leakage
  name: PII sensitive data leakage
  description: Warns on possible personal data exposure in chat traffic.
  enabled: true
  severity: medium
  action: warn
  direction: both
  match_type: regex
  scope: global
  agent_id: null
  policy_mode: null
  patterns:
  - (?i)\b(passport|national\s+id|social\s+security|ssn|tax\s+id|vat\s+number)\b\s*[:=]?\s*[A-Z0-9\-]{6,}

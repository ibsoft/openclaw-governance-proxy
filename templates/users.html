{% extends "base.html" %}{% block content %}<h1>Users</h1><a class="btn btn-primary mb-3" href="{{ url_for('user_new') }}">Create User</a><table class="table"><tr><th>User</th><th>Email</th><th>Role</th><th>Enabled</th><th>Last Login</th><th></th></tr>{% for u in page.items %}<tr><td>{{ u.username }}</td><td>{{ u.email }}</td><td>{{ u.role }}</td><td>{{ u.enabled }}</td><td>{{ u.last_login_at }}</td><td><a href="{{ url_for('user_edit', user_id=u.id) }}">Edit</a></td></tr>{% endfor %}</table>{% include "_pagination.html" %}{% endblock %}

<nav><ul class="pagination">
  <li class="page-item {% if not page.has_previous %}disabled{% endif %}"><a class="page-link" href="?page={{ page.page-1 }}&per_page={{ page.per_page }}">Previous</a></li>
  <li class="page-item disabled"><span class="page-link">Page {{ page.page }} / {{ page.total_pages }} · {{ page.total }} rows</span></li>
  <li class="page-item {% if not page.has_next %}disabled{% endif %}"><a class="page-link" href="?page={{ page.page+1 }}&per_page={{ page.per_page }}">Next</a></li>
</ul></nav>
